name: iOS TestFlight Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - 'ios-v*.*.*'

jobs:
  deploy:
    runs-on: macos-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true
          working-directory: packages/mobile

      - name: Install all dependencies
        run: npm ci

      - name: Verify React Native version
        working-directory: packages/mobile
        run: |
          echo "Local RN:" && cat node_modules/react-native/package.json 2>/dev/null | grep '"version"' || echo "No local RN"
          echo "Root RN:" && cat ../../node_modules/react-native/package.json 2>/dev/null | grep '"version"' || echo "No root RN"
          echo "Local React:" && cat node_modules/react/package.json 2>/dev/null | grep '"version"' || echo "No local React"

      - name: Build shared package
        working-directory: packages/shared
        run: npm run build

      - name: Install CocoaPods
        working-directory: packages/mobile/ios
        run: pod install

      - name: Decode signing certificate
        working-directory: packages/mobile
        env:
          IOS_CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
        run: |
          echo "$IOS_CERTIFICATE_P12" | base64 --decode > /tmp/certificate.p12

      - name: Decode provisioning profiles
        env:
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
          IOS_WIDGET_PROVISIONING_PROFILE: ${{ secrets.IOS_WIDGET_PROVISIONING_PROFILE }}
        run: |
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode > /tmp/app.mobileprovision
          echo "$IOS_WIDGET_PROVISIONING_PROFILE" | base64 --decode > /tmp/widget.mobileprovision

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_KEY_P8: ${{ secrets.APP_STORE_CONNECT_KEY_P8 }}
        run: echo "$APP_STORE_CONNECT_KEY_P8" > /tmp/AuthKey.p8

      - name: Deploy to TestFlight
        working-directory: packages/mobile
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_PATH: /tmp/AuthKey.p8
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          CERTIFICATE_PATH: /tmp/certificate.p12
          APP_PROFILE_PATH: /tmp/app.mobileprovision
          WIDGET_PROFILE_PATH: /tmp/widget.mobileprovision
          APP_PROFILE_NAME: ${{ secrets.IOS_APP_PROFILE_NAME || 'Flashpad App Store iOS' }}
          WIDGET_PROFILE_NAME: ${{ secrets.IOS_WIDGET_PROFILE_NAME || 'Flashpad Widget App Store iOS' }}
        run: bundle exec fastlane beta

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: packages/mobile/build_logs/

      - name: Commit build number bump
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/mobile/ios/mobile.xcodeproj/project.pbxproj
          git commit -m "chore: bump iOS build number [skip ci]" || echo "No changes to commit"
          git push origin HEAD:master
