<!DOCTYPE html>
<html lang="en" data-theme="dark" data-variant="paper">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashpad</title>
    <script>
      // FOUC-safe appearance bootstrap. Runs before any stylesheet links below.
      (function () {
        try {
          var r = document.documentElement;
          var raw = localStorage.getItem('flashpad.appearance');
          var a = raw ? JSON.parse(raw) : {};
          var t = a.theme;
          if (t === 'system' || t == null) {
            t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
          }
          r.dataset.theme = (t === 'light') ? 'light' : 'dark';
          var v = a.variant;
          if (v === 'paper' || v === 'terminal' || v === 'atelier' || v === 'index') {
            r.dataset.variant = v;
          }
          var fs = a.editorFontSize;
          if (typeof fs === 'number' && fs >= 13 && fs <= 22) {
            r.style.setProperty('--editor-size', fs + 'px');
          }
        } catch (e) { /* keep static fallback on <html> */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
