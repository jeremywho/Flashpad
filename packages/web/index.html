<!DOCTYPE html>
<html lang="en" data-theme="dark" data-variant="paper">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flashpad - Capture First, Organize Later</title>

    <!-- Meta description -->
    <meta name="description" content="A minimal-friction note-taking app that syncs across all your devices. Capture first, organize later." />

    <!-- Open Graph tags -->
    <meta property="og:title" content="Flashpad - Capture First, Organize Later" />
    <meta property="og:description" content="A minimal-friction note-taking app that syncs across all your devices." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://flashpad.cc" />
    <meta property="og:image" content="https://flashpad.cc/og-image.png" />

    <!-- Twitter Card tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Flashpad - Capture First, Organize Later" />
    <meta name="twitter:description" content="A minimal-friction note-taking app that syncs across all your devices." />
    <meta name="twitter:image" content="https://flashpad.cc/og-image.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="shortcut icon" href="/favicon.ico" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Theme color -->
    <meta name="theme-color" content="#1a1a2e" />

    <script>
      // FOUC-safe appearance bootstrap. Runs before any stylesheet links below.
      (function () {
        try {
          var r = document.documentElement;
          var raw = localStorage.getItem('flashpad.appearance');
          var a = raw ? JSON.parse(raw) : {};
          var t = a.theme;
          if (t == null) {
            // Migrate from legacy 'theme' key if present
            var legacy = localStorage.getItem('theme');
            if (legacy === 'light' || legacy === 'dark' || legacy === 'system') t = legacy;
          }
          if (t === 'system' || t == null) {
            t = (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
          }
          r.dataset.theme = (t === 'light') ? 'light' : 'dark';
          var v = a.variant;
          if (v === 'paper' || v === 'terminal' || v === 'atelier' || v === 'index') {
            r.dataset.variant = v;
          }
          var fs = a.editorFontSize;
          if (typeof fs === 'number' && fs >= 13 && fs <= 22) {
            r.style.setProperty('--editor-size', fs + 'px');
          }
        } catch (e) { /* keep static fallback on <html> */ }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
